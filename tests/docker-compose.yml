# Docker Compose file for testing the SQLAlchemy dialect for CrateDB.
---
# docker compose -f tests/docker-compose.yml up
services:
  cratedb:
    image: crate/crate:${CRATEDB_VERSION}
    environment:
      CRATE_HEAP_SIZE: 2g
    volumes:
      - ./assets:/assets
    ports:
      - "4200:4200"
      - "5432:5432"
